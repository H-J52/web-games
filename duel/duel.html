<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>ONE BULLET : DUEL</title>
  <style>
    /* =====================
       Reset & Base
    ===================== */
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #0e0e11;
      color: #eee;
      font-family: system-ui, sans-serif;
      overflow: hidden;
    }

    /* =====================
       Layout
    ===================== */
    #game {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 80px;
    }

    /* =====================
       Player Panel
    ===================== */
    .player {
      width: 260px;
      padding: 24px;
      border-left: 4px solid #444;
    }

    .player.right {
      text-align: right;
      border-left: none;
      border-right: 4px solid #444;
    }

    /* 플레이어 이름 (클릭 시 변경) */
    .name {
      font-size: 24px;
      font-weight: 700;
      cursor: pointer;
      margin-bottom: 12px;
      opacity: 0.9;
      transition: color 0.2s;
    }

    .name:hover {
      opacity: 1;
      text-decoration: underline;
    }

    /* 상태 표시 영역 */
    .status {
      height: 60px;
      font-size: 18px;
      transition: color 0.2s;
    }

    .status-reloading  { opacity: 0.6; }
    .status-defending  { color: #6cf; }
    .status-dead       { color: #ff5555; font-size: 28px; }

    /* =====================
       Progress Bars
    ===================== */
    .bar-track {
      width: 100%;
      height: 4px;
      margin-top: 6px;
      background: #222;
    }

    .bar-fill {
      height: 100%;
      width: 0%;
    }

    .bar-fill.reload   { background: #ffbb66; }
    .bar-fill.defend   { background: #6cf; }
    .bar-fill.cooldown { background: rgba(102, 204, 255, 0.3); }

    /* =====================
       Center Zone
    ===================== */
    #centerZone {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    #centerText {
      font-size: 72px;
      font-weight: 900;
      letter-spacing: 4px;
      transition: transform 0.2s, color 0.2s, opacity 0.2s;
    }

    #subText {
      margin-top: 10px;
      opacity: 0.5;
      font-size: 14px;
    }

    /* =====================
       Traffic Light
    ===================== */
    #trafficLight {
      position: absolute;
      top: 10px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
    }

    .light {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #333;
      transition: background 0.1s;
    }

    .light.red.active   { background: #ff4444; }
    .light.green.active { background: #44ff88; }

    /* =====================
       HUD
    ===================== */
    #hint {
      position: absolute;
      bottom: 20px;
      width: 100%;
      text-align: center;
      font-size: 13px;
      opacity: 0.4;
    }

    #scoreDisplay {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 18px;
      font-weight: 700;
    }

    /* =====================
       Screen Flash Effect
    ===================== */
    #flash {
      position: absolute;
      inset: 0;
      background: white;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }
  </style>
</head>
<body>

  <!-- 플레이어 패널 -->
  <div id="game">
    <div class="player left">
      <div class="name" id="p1Name">PLAYER 1</div>
      <div class="status" id="p1Status"></div>
    </div>
    <div class="player right">
      <div class="name" id="p2Name">PLAYER 2</div>
      <div class="status" id="p2Status"></div>
    </div>
  </div>

  <!-- 중앙 텍스트 -->
  <div id="centerZone">
    <div id="centerText">READY</div>
    <div id="subText">ONE BULLET. ONE CHANCE.</div>
  </div>

  <!-- 신호등 -->
  <div id="trafficLight">
    <div class="light red"   id="redLight"></div>
    <div class="light green" id="greenLight"></div>
  </div>

  <!-- 키 안내 -->
  <div id="hint">P1 : A(DEF) / S(FIRE) ｜ P2 : K(DEF) / L(FIRE)</div>

  <!-- 점수 -->
  <div id="scoreDisplay"></div>

  <!-- 화면 플래시 -->
  <div id="flash"></div>

  <script>
    /* =====================
       상수 정의
    ===================== */
    const DEFEND_DURATION_MS  = 2000; // 방어 지속 시간 (ms)
    const DEFEND_COOLDOWN_MS  = 500;  // 방어 쿨타임 (ms)
    const RELOAD_DURATION_MS  = 2000; // 장전 시간 (ms)
    const FIRE_RESOLVE_DELAY  = 60;   // 동시 발사 판정 대기 시간 (ms)
    const ROUND_RESET_DELAY   = 2000; // 라운드 종료 후 초기화 대기 시간 (ms)
    const SIGNAL_MIN_DELAY_MS = 1500; // FIGHT! 신호 최소 대기 시간 (ms)
    const SIGNAL_MAX_DELAY_MS = 3000; // FIGHT! 신호 최대 대기 시간 (ms)
    const WIN_SCORE           = 10;   // 최종 승리 점수

    /* =====================
       플레이어 데이터
    ===================== */

    /**
     * 플레이어 상태 객체
     * @typedef {Object} Player
     * @property {string}  id           - 플레이어 식별자 ('p1' | 'p2')
     * @property {string}  name         - 플레이어 표시 이름
     * @property {string}  fireKey      - 발사 키
     * @property {string}  defendKey    - 방어 키
     * @property {boolean} hasBullet    - 총알 보유 여부
     * @property {boolean} isDefending  - 방어 중 여부
     * @property {boolean} isAlive      - 생존 여부
     * @property {boolean} onCooldown   - 방어 쿨타임 여부
     * @property {number}  score        - 누적 점수
     * @property {number|null} defendTimerId - 방어 타이머 ID
     */
    const players = {
      p1: {
        id: "p1", name: "PLAYER 1",
        fireKey: "s", defendKey: "a",
        hasBullet: true, isDefending: false,
        isAlive: true, onCooldown: false,
        score: 0, defendTimerId: null
      },
      p2: {
        id: "p2", name: "PLAYER 2",
        fireKey: "l", defendKey: "k",
        hasBullet: true, isDefending: false,
        isAlive: true, onCooldown: false,
        score: 0, defendTimerId: null
      }
    };

    /** 상대 플레이어 ID 반환 */
    const getOpponentId = id => id === "p1" ? "p2" : "p1";

    /* =====================
       게임 상태
    ===================== */
    let canShoot    = false;  // 신호 이전 발사 방지
    let isRoundOver = false;
    let isGameOver  = false;
    let fireQueue   = [];     // 동시 발사 처리용 큐
    let signalTimer = null;

    /* =====================
       DOM 참조
    ===================== */
    const centerTextEl  = document.getElementById("centerText");
    const scoreDisplayEl = document.getElementById("scoreDisplay");
    const flashEl       = document.getElementById("flash");
    const redLightEl    = document.getElementById("redLight");
    const greenLightEl  = document.getElementById("greenLight");

    /** 플레이어별 DOM 요소를 ID로 접근 */
    function getPlayerElements(playerId) {
      return {
        nameEl:   document.getElementById(`${playerId}Name`),
        statusEl: document.getElementById(`${playerId}Status`)
      };
    }

    /* =====================
       이름 변경
    ===================== */
    Object.values(players).forEach(player => {
      const { nameEl } = getPlayerElements(player.id);
      nameEl.onclick = () => {
        const input = prompt("플레이어 이름 변경", player.name);
        if (input && input.trim()) {
          player.name = input.trim();
          nameEl.innerText = player.name;
          renderScore();
        }
      };
    });

    /* =====================
       렌더링
    ===================== */

    /** 두 플레이어의 상태 UI를 갱신 */
    function renderAllStatus() {
      Object.values(players).forEach(renderPlayerStatus);
    }

    /**
     * 개별 플레이어 상태 UI 렌더링
     * @param {Player} player
     */
    function renderPlayerStatus(player) {
      const { statusEl } = getPlayerElements(player.id);

      if (!player.isAlive) {
        statusEl.innerHTML = `<div class="status-dead">DEAD</div>`;
        blinkRed(getPlayerElements(player.id).nameEl);
        return;
      }

      if (player.isDefending) {
        statusEl.innerHTML = `
          <div class="status-defending">DEFENDING</div>
          <div class="bar-track"><div class="bar-fill defend"></div></div>
        `;
        animateBar(statusEl.querySelector(".bar-fill"), DEFEND_DURATION_MS, "100%", "0%");
        return;
      }

      if (player.onCooldown) {
        statusEl.innerHTML = `
          <div class="status-reloading">DEFEND COOLDOWN</div>
          <div class="bar-track"><div class="bar-fill cooldown"></div></div>
        `;
        animateBar(statusEl.querySelector(".bar-fill"), DEFEND_COOLDOWN_MS, "0%", "100%");
        return;
      }

      if (!player.hasBullet) {
        statusEl.innerHTML = `
          <div class="status-reloading">RELOADING</div>
          <div class="bar-track"><div class="bar-fill reload"></div></div>
        `;
        animateBar(statusEl.querySelector(".bar-fill"), RELOAD_DURATION_MS, "0%", "100%");
        return;
      }

      statusEl.innerHTML = "READY";
    }

    /**
     * 진행 바 애니메이션 트리거
     * reflow를 강제하여 transition이 시작점에서 올바르게 동작하도록 처리
     * @param {HTMLElement} barEl
     * @param {number} durationMs
     * @param {string} from
     * @param {string} to
     */
    function animateBar(barEl, durationMs, from, to) {
      barEl.style.transition = "none";
      barEl.style.width = from;
      barEl.offsetWidth; // reflow 강제 (transition 재시작)
      barEl.style.transition = `width ${durationMs}ms linear`;
      barEl.style.width = to;
    }

    /**
     * 요소를 붉은색으로 깜빡이는 시각 피드백
     * @param {HTMLElement} el
     */
    function blinkRed(el) {
      el.style.transition = "color 0.1s";
      el.style.color = "#ff5555";
      setTimeout(() => el.style.color = "", 200);
    }

    /** 점수 HUD 갱신 */
    function renderScore() {
      const { p1, p2 } = players;
      scoreDisplayEl.innerText = `${p1.name}: ${p1.score} | ${p2.name}: ${p2.score}`;
    }

    /**
     * 중앙 텍스트 변경 + 팝 애니메이션
     * @param {string} text
     * @param {string} color
     */
    function showCenterText(text, color) {
      centerTextEl.innerText = text;
      centerTextEl.style.color = color;
      centerTextEl.style.transform = "scale(1.3)";
      setTimeout(() => centerTextEl.style.transform = "scale(1)", 100);
    }

    /* =====================
       장전
    ===================== */

    /**
     * 일정 시간 후 총알 복구
     * @param {Player} player
     */
    function scheduleReload(player) {
      setTimeout(() => {
        if (!isRoundOver) {
          player.hasBullet = true;
          renderPlayerStatus(player);
        }
      }, RELOAD_DURATION_MS);
    }

    /* =====================
       발사 처리
    ===================== */

    /**
     * 발사 입력 처리
     * @param {string} playerId
     */
    function handleFire(playerId) {
      if (isGameOver) return;

      const player = players[playerId];
      if (isRoundOver || !player.isAlive || !player.hasBullet ||
          player.onCooldown || player.isDefending) return;

      // 신호 전 조기 발사 패널티
      if (!canShoot) {
        player.score = Math.max(0, player.score - 1);
        player.isAlive = false;
        showCenterText(`${player.name} SHOT TOO EARLY (-1)`, "#ff5555");
        blinkRed(getPlayerElements(playerId).statusEl);
        blinkRed(getPlayerElements(playerId).nameEl);
        scheduleReload(player);
        renderAllStatus();
        renderScore();
        endRound();
        return;
      }

      // 총알 소비 후 큐에 등록
      player.hasBullet = false;
      fireQueue.push(playerId);
      renderPlayerStatus(player);

      // 두 플레이어 동시 발사 처리
      if (fireQueue.length === 2) {
        showCenterText("DRAW", "#fff");
        fireQueue.forEach(id => scheduleReload(players[id]));
        fireQueue = [];
        endRound();
        return;
      }

      // 단독 발사 — 상대 반응 대기 후 판정
      setTimeout(resolveFireResult, FIRE_RESOLVE_DELAY);
    }

    /**
     * 단독 발사 결과 판정
     * 상대가 방어 중이면 방어 성공(+1), 아니면 사망(+2)
     */
    function resolveFireResult() {
      const shooterId = fireQueue[0];
      const targetId  = getOpponentId(shooterId);
      const shooter   = players[shooterId];
      const target    = players[targetId];

      if (target.isDefending) {
        target.score += 1;
        showCenterText("BLOCKED! +1", "#6cf");
        blinkRed(getPlayerElements(targetId).nameEl);
      } else {
        shooter.score += 2;
        target.isAlive = false;
        showCenterText(`${shooter.name} WINS! +2`, "#44ff88");
        blinkRed(getPlayerElements(shooterId).nameEl);
        blinkRed(getPlayerElements(targetId).nameEl);
      }

      renderScore();

      // 최종 승리 조건 확인
      if (shooter.score >= WIN_SCORE) {
        triggerGameOver(shooter.name);
        return;
      }
      if (target.score >= WIN_SCORE) {
        triggerGameOver(target.name);
        return;
      }

      fireQueue = [];
      scheduleReload(shooter);
      renderAllStatus();
      endRound();
    }

    /* =====================
       방어 처리
    ===================== */

    /**
     * 방어 입력 처리
     * @param {string} playerId
     */
    function handleDefend(playerId) {
      const player = players[playerId];
      if (!player.isAlive || player.onCooldown || isRoundOver) return;

      player.isDefending = true;
      renderPlayerStatus(player);

      // 기존 방어 타이머가 있으면 취소
      if (player.defendTimerId !== null) {
        clearTimeout(player.defendTimerId);
      }

      player.defendTimerId = setTimeout(() => {
        player.isDefending = false;
        player.onCooldown = true;
        renderPlayerStatus(player);

        // 쿨타임 종료 후 방어 다시 사용 가능
        setTimeout(() => {
          player.onCooldown = false;
          renderPlayerStatus(player);
        }, DEFEND_COOLDOWN_MS);

        player.defendTimerId = null;
      }, DEFEND_DURATION_MS);
    }

    /* =====================
       신호등 & 라운드 흐름
    ===================== */

    /** 신호등을 초기화하고 랜덤 딜레이 후 FIGHT! 신호 */
    function startSignalSequence() {
      canShoot = false;
      showCenterText("READY", "#fff");
      redLightEl.classList.add("active");
      greenLightEl.classList.remove("active");

      const delay = SIGNAL_MIN_DELAY_MS +
        Math.random() * (SIGNAL_MAX_DELAY_MS - SIGNAL_MIN_DELAY_MS);

      signalTimer = setTimeout(() => {
        if (isGameOver) return;
        canShoot = true;
        centerTextEl.innerText = "FIGHT!";
        centerTextEl.style.color = "#ffdd44";
        centerTextEl.style.transform = "scale(1.5)";
        setTimeout(() => {
          centerTextEl.style.transform = "scale(1)";
          centerTextEl.style.color = "#fff";
        }, 150);
        redLightEl.classList.remove("active");
        greenLightEl.classList.add("active");
      }, delay);
    }

    /** 라운드 종료 처리 */
    function endRound() {
      isRoundOver = true;
      clearTimeout(signalTimer);
      setTimeout(resetRound, ROUND_RESET_DELAY);
    }

    /** 라운드 초기화 및 다음 라운드 시작 */
    function resetRound() {
      if (isGameOver) return;

      isRoundOver = false;
      fireQueue   = [];

      Object.values(players).forEach(player => {
        player.hasBullet   = true;
        player.isDefending = false;
        player.isAlive     = true;
        player.onCooldown  = false;
        if (player.defendTimerId !== null) {
          clearTimeout(player.defendTimerId);
          player.defendTimerId = null;
        }
      });

      renderAllStatus();
      startSignalSequence();
    }

    /* =====================
       게임 종료
    ===================== */

    /**
     * 최종 승자 선언 및 화면 연출
     * @param {string} winnerName
     */
    function triggerGameOver(winnerName) {
      isGameOver = true;
      centerTextEl.innerText = `${winnerName} WINS THE GAME!`;
      centerTextEl.style.color = "#ffdd44";
      centerTextEl.style.transform = "scale(1.8)";

      // 화면 플래시 효과
      flashEl.style.opacity = "0.5";
      setTimeout(() => flashEl.style.opacity = "0", 100);

      Object.keys(players).forEach(id => {
        blinkRed(getPlayerElements(id).nameEl);
      });
    }

    /* =====================
       키보드 입력
    ===================== */
    document.addEventListener("keydown", event => {
      const key = event.key.toLowerCase();
      Object.values(players).forEach(player => {
        if (key === player.fireKey)   handleFire(player.id);
        if (key === player.defendKey) handleDefend(player.id);
      });
    });

    /* =====================
       초기화
    ===================== */
    renderAllStatus();
    renderScore();
    startSignalSequence();
  </script>
</body>
</html>
