<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>Neon 2P PvP Shooter</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      background: #111;
      overflow: hidden;
      width: 100%;
      height: 100%;
    }

    canvas {
      display: block;
      transform-origin: top left;
    }
  </style>
</head>
<body>
  <canvas id="game" width="1920" height="1080"></canvas>

  <script>
    /* =====================
       캔버스 & 상수
    ===================== */
    const canvas = document.getElementById("game");
    const ctx    = canvas.getContext("2d");

    const WIDTH  = 1920;
    const HEIGHT = 1080;

    const PLAYER_RADIUS    = 15;
    const BULLET_RADIUS    = 5;
    const BULLET_SPEED     = 900;
    const PLAYER_SPEED     = 260;
    const MAX_HP           = 3;

    const PORTAL_RADIUS    = 25;
    const PORTAL_COOLDOWN  = 0.8;  // 포탈 이동 후 재진입 방지 시간 (초)

    const TRAIL_MAX_LENGTH = 12;   // 플레이어 잔상 최대 길이
    const BULLET_TRAIL_MAX = 5;    // 탄환 잔상 최대 길이
    const TRAIL_DECAY      = 0.65; // 잔상 투명도 감쇠율

    const STAR_COUNT       = 200;
    const WALL_COUNT       = 8;

    const SPAWN_MARGIN     = 50;   // 스폰 위치의 벽/경계 여유 마진
    const SPAWN_MAX_TRIES  = 200;  // 유효 스폰 위치 탐색 최대 시도 횟수

    const HIT_STOP_DURATION = 0.06;
    const SHAKE_TIME        = 0.15;
    const SHAKE_POWER       = 10;

    /* =====================
       유틸리티
    ===================== */

    /**
     * 값을 min~max 사이로 클램프
     */
    const clamp = (v, min, max) => Math.max(min, Math.min(max, v));

    /**
     * 선형 합동 생성기(LCG) 기반 시드 난수 생성기
     * 동일 시드로 재현 가능한 난수 수열 생성
     * @param {number} seed
     * @returns {function(): number} 0~1 사이 난수 반환 함수
     */
    function createSeededRNG(seed) {
      return () => ((seed = (seed * 1664525 + 1013904223) >>> 0) / 4294967296);
    }
    const rng = createSeededRNG(Date.now());

    /**
     * 두 AABB(축 정렬 경계 상자)가 겹치는지 확인
     */
    const rectsOverlap = (a, b) =>
      !(a.x + a.w < b.x || a.x > b.x + b.w ||
        a.y + a.h < b.y || a.y > b.y + b.h);

    /**
     * 포탈 위치가 어떤 벽과도 겹치지 않는지 확인
     */
    const isPortalPositionValid = (portal, walls) =>
      !walls.some(w =>
        portal.x + PORTAL_RADIUS > w.x &&
        portal.x - PORTAL_RADIUS < w.x + w.w &&
        portal.y + PORTAL_RADIUS > w.y &&
        portal.y - PORTAL_RADIUS < w.y + w.h
      );

    /**
     * 원(x, y, r)이 어떤 벽과도 겹치지 않는지 확인
     * AABB-Circle 충돌 감지
     */
    const isCircleClearOfWalls = (x, y, r, walls) =>
      !walls.some(w => {
        const cx = clamp(x, w.x, w.x + w.w);
        const cy = clamp(y, w.y, w.y + w.h);
        return Math.hypot(x - cx, y - cy) < r;
      });

    /* =====================
       Canvas 스케일링 (해상도 독립적 렌더링)
       내부 해상도 1920×1080을 화면 크기에 맞게 letterbox 방식으로 스케일
    ===================== */
    function resizeCanvas() {
      const scale = Math.min(innerWidth / WIDTH, innerHeight / HEIGHT);
      const offsetX = (innerWidth  - WIDTH  * scale) / 2;
      const offsetY = (innerHeight - HEIGHT * scale) / 2;
      canvas.style.transform = `scale(${scale}) translate(${offsetX / scale}px, ${offsetY / scale}px)`;
    }
    addEventListener("resize", resizeCanvas);
    resizeCanvas();

    /* =====================
       키보드 입력
    ===================== */
    const keys = {};
    addEventListener("keydown", e => {
      keys[e.code] = true;
      if (isGameOver && e.code === "KeyR") initGame();
    });
    addEventListener("keyup",  e => keys[e.code] = false);
    // 포커스 잃으면 모든 키 해제 (Alt+Tab 등으로 인한 키 고착 방지)
    addEventListener("blur",   () => { for (const k in keys) keys[k] = false; });

    /* =====================
       히트 스톱 & 카메라 쉐이크
       피격 시 일시 정지 + 화면 흔들림으로 타격감 표현
    ===================== */
    let hitStopRemaining = 0;
    let shakeTimeRemaining = 0;
    let shakePower = 0;

    const applyHitStop = duration =>
      hitStopRemaining = Math.max(hitStopRemaining, duration);

    const applyShake = (time = SHAKE_TIME, power = SHAKE_POWER) => {
      shakeTimeRemaining = time;
      shakePower = power;
    };

    /* =====================
       별 배경 (파티클 풀 방식)
    ===================== */
    class Star {
      constructor() {
        this.reset();
        this.y = rng() * HEIGHT; // 초기화 시 화면 전체에 분산
      }

      reset() {
        this.x     = rng() * WIDTH;
        this.y     = -2;
        this.speed = rng() * 20 + 10;
        this.size  = rng() * 1.5 + 0.5;
        this.alpha = rng() * 0.4 + 0.1;
      }

      update(dt) {
        this.y += this.speed * dt;
        if (this.y > HEIGHT + 2) this.reset();
      }

      render() {
        ctx.fillStyle = `rgba(255,255,255,${this.alpha})`;
        ctx.fillRect(this.x, this.y, this.size, this.size);
      }
    }

    /* =====================
       파티클 이펙트
    ===================== */
    class Particle {
      /**
       * @param {number} x, y   - 생성 위치
       * @param {string} color  - 색상
       * @param {number} vx, vy - 속도
       * @param {number} life   - 수명 (초)
       * @param {number} radius - 반지름
       */
      constructor(x, y, color, vx, vy, life, radius) {
        this.x      = x;
        this.y      = y;
        this.color  = color;
        this.vx     = vx;
        this.vy     = vy;
        this.life   = life;
        this.radius = radius;
        this.alpha  = 1;
      }

      update(dt) {
        this.x    += this.vx * dt;
        this.y    += this.vy * dt;
        this.life -= dt;
        this.alpha = Math.max(this.life, 0);
      }

      render() {
        ctx.globalAlpha  = this.alpha;
        ctx.shadowColor  = this.color;
        ctx.shadowBlur   = 15;
        ctx.fillStyle    = this.color;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }
    }

    /**
     * 원형으로 파티클 분출
     * @param {number} x, y    - 분출 중심
     * @param {string} color
     * @param {number} count   - 파티클 수
     * @param {number} minSpeed, maxSpeed
     * @param {number} life
     * @param {number} radius
     */
    function spawnParticles(x, y, color, count, minSpeed, maxSpeed, life, radius) {
      for (let i = 0; i < count; i++) {
        const angle = rng() * Math.PI * 2;
        const speed = rng() * (maxSpeed - minSpeed) + minSpeed;
        particles.push(new Particle(
          x, y, color,
          Math.cos(angle) * speed,
          Math.sin(angle) * speed,
          life, radius
        ));
      }
    }

    /* =====================
       플레이어
    ===================== */
    class Player {
      /**
       * @param {number} x, y  - 초기 위치
       * @param {string} color - 네온 색상
       * @param {object} ctrl  - 키 바인딩
       */
      constructor(x, y, color, ctrl) {
        this.x     = x;
        this.y     = y;
        this.color = color;
        this.ctrl  = ctrl;

        this.radius         = PLAYER_RADIUS;
        this.speed          = PLAYER_SPEED;
        this.angle          = 0;           // 조준 각도
        this.aimState       = "idle";      // "idle" | "aim"
        this.attackLocked   = false;       // 키 연속 입력 방지
        this.hp             = MAX_HP;
        this.portalCooldown = 0;           // 포탈 재진입 방지 타이머
        this.trail          = [];          // 잔상 데이터
      }

      update(dt, walls, portalA, portalB) {
        if (this.hp <= 0) return;

        if (this.portalCooldown > 0) this.portalCooldown -= dt;

        this.handleMovement(dt, walls);
        this.handleAttack(dt);
        this.tryEnterPortal(portalA, portalB);
        this.tryEnterPortal(portalB, portalA);
      }

      /** 이동 입력 처리 */
      handleMovement(dt, walls) {
        let dx = 0, dy = 0;
        if (keys[this.ctrl.up])    dy--;
        if (keys[this.ctrl.down])  dy++;
        if (keys[this.ctrl.left])  dx--;
        if (keys[this.ctrl.right]) dx++;

        if (dx !== 0 || dy !== 0) {
          this.moveWithCollision(dx, dy, dt, walls);
        }

        // 잔상 추가 및 오래된 잔상 제거
        this.trail.push({ x: this.x, y: this.y, alpha: 0.4 });
        if (this.trail.length > TRAIL_MAX_LENGTH) this.trail.shift();
      }

      /**
       * 이동 + 벽 충돌 처리
       * 이동 후 벽 겹침이 감지되면 이동 취소 (슬라이딩 없이 단순 막기)
       */
      moveWithCollision(dx, dy, dt, walls) {
        const length = Math.hypot(dx, dy);
        const nx = clamp(this.x + (dx / length) * this.speed * dt, this.radius, WIDTH  - this.radius);
        const ny = clamp(this.y + (dy / length) * this.speed * dt, this.radius, HEIGHT - this.radius);

        if (!isCircleClearOfWalls(nx, ny, this.radius, walls)) return;

        this.x = nx;
        this.y = ny;
      }

      /** 공격 입력 처리 (2단계 조준 시스템) */
      handleAttack(dt) {
        const isAttackPressed = keys[this.ctrl.attack];

        if (isAttackPressed && !this.attackLocked) {
          this.attackLocked = true;

          if (this.aimState === "idle") {
            this.aimState = "aim"; // 1번 누름: 조준 시작
          } else {
            shoot(this);           // 2번 누름: 발사
            this.aimState = "idle";
          }
        }

        if (!isAttackPressed) this.attackLocked = false;

        // 조준 중 각도 회전
        if (this.aimState === "aim") this.angle += dt * 2;
      }

      /**
       * 포탈 진입 처리
       * from 포탈에 닿으면 to 포탈 위치로 순간이동
       */
      tryEnterPortal(from, to) {
        if (this.portalCooldown > 0) return;
        if (Math.hypot(this.x - from.x, this.y - from.y) >= PORTAL_RADIUS) return;

        spawnParticles(this.x, this.y, this.color, 15, 100, 400, 0.5, 3);
        this.x = to.x;
        this.y = to.y;
        this.portalCooldown = PORTAL_COOLDOWN;
      }

      render() {
        // 잔상 렌더링
        this.trail.forEach(t => {
          ctx.globalAlpha = t.alpha;
          ctx.fillStyle   = "#fff";
          ctx.shadowColor = this.color;
          ctx.shadowBlur  = 20;
          ctx.beginPath();
          ctx.arc(t.x, t.y, this.radius, 0, Math.PI * 2);
          ctx.fill();
          t.alpha *= TRAIL_DECAY;
        });
        ctx.globalAlpha = 1;

        // 조준 부채꼴 표시
        if (this.aimState === "aim") {
          ctx.fillStyle = "rgba(255,255,255,0.15)";
          ctx.shadowColor = this.color;
          ctx.shadowBlur  = 25;
          ctx.beginPath();
          ctx.moveTo(this.x, this.y);
          ctx.arc(this.x, this.y, 80, this.angle - 0.4, this.angle + 0.4);
          ctx.fill();
        }

        // 플레이어 본체 (방사형 그라디언트)
        const gradient = ctx.createRadialGradient(this.x, this.y, 5, this.x, this.y, this.radius);
        gradient.addColorStop(0, "#fff");
        gradient.addColorStop(1, this.color);

        ctx.shadowColor = this.color;
        ctx.shadowBlur  = 25;
        ctx.fillStyle   = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
        ctx.fill();

        // HP 바
        const barW = 44, barH = 8;
        const barX = this.x - barW / 2;
        const barY = this.y - this.radius - 18;

        ctx.shadowBlur = 0;
        ctx.fillStyle  = "#222";
        ctx.fillRect(barX, barY, barW, barH);

        ctx.fillStyle = "#f44";
        ctx.fillRect(barX + 2, barY + 1, (barW - 4) * (this.hp / MAX_HP), barH - 2);

        ctx.strokeStyle = "#fff";
        ctx.lineWidth   = 2;
        ctx.strokeRect(barX, barY, barW, barH);
      }
    }

    /* =====================
       탄환
    ===================== */
    const bullets = [];

    /**
     * 플레이어 위치와 조준 각도로 탄환 생성
     * @param {Player} player
     */
    function shoot(player) {
      bullets.push({
        x:     player.x,
        y:     player.y,
        vx:    Math.cos(player.angle) * BULLET_SPEED,
        vy:    Math.sin(player.angle) * BULLET_SPEED,
        owner: player,
        color: player.color,
        trail: []
      });
    }

    /** 탄환 이동, 충돌 처리, 렌더링 */
    function updateBullets(dt) {
      for (let i = bullets.length - 1; i >= 0; i--) {
        const bullet = bullets[i];

        bullet.x += bullet.vx * dt;
        bullet.y += bullet.vy * dt;

        bullet.trail.push({ x: bullet.x, y: bullet.y, alpha: 0.4 });
        if (bullet.trail.length > BULLET_TRAIL_MAX) bullet.trail.shift();

        // 화면 밖 또는 벽 충돌 시 제거
        const hitWall = !isCircleClearOfWalls(bullet.x, bullet.y, BULLET_RADIUS, walls);
        const outOfBounds = bullet.x < 0 || bullet.x > WIDTH ||
                            bullet.y < 0 || bullet.y > HEIGHT;

        if (outOfBounds || hitWall) {
          spawnParticles(bullet.x, bullet.y, "#fff", 8, 50, 200, 0.3, 2);
          bullets.splice(i, 1);
          continue;
        }

        // 플레이어 충돌 판정
        [player1, player2].forEach(player => {
          if (player === bullet.owner) return; // 자기 자신 제외
          if (player.hp <= 0) return;

          const dist = Math.hypot(bullet.x - player.x, bullet.y - player.y);
          if (dist >= BULLET_RADIUS + player.radius) return;

          // 피격 처리
          player.hp--;
          applyHitStop(HIT_STOP_DURATION);
          applyShake();
          spawnParticles(player.x, player.y, player.color, 15, 0, 250, 0.6, 3);
          bullets.splice(i, 1);

          if (player.hp <= 0) isGameOver = true;
        });
      }
    }

    /** 탄환 렌더링 (잔상 포함) */
    function renderBullets() {
      bullets.forEach(bullet => {
        // 잔상
        bullet.trail.forEach(t => {
          ctx.globalAlpha = t.alpha;
          ctx.fillStyle   = "#fff";
          ctx.shadowColor = bullet.color;
          ctx.shadowBlur  = 12;
          ctx.beginPath();
          ctx.arc(t.x, t.y, BULLET_RADIUS, 0, Math.PI * 2);
          ctx.fill();
          t.alpha *= TRAIL_DECAY;
        });
        ctx.globalAlpha = 1;

        // 탄환 본체
        ctx.fillStyle  = bullet.color;
        ctx.shadowColor = bullet.color;
        ctx.shadowBlur  = 12;
        ctx.beginPath();
        ctx.arc(bullet.x, bullet.y, BULLET_RADIUS, 0, Math.PI * 2);
        ctx.fill();
      });
    }

    /* =====================
       맵 생성
    ===================== */
    let walls   = [];
    let portalA = null;
    let portalB = null;

    /** 랜덤 벽과 포탈을 생성 */
    function generateMap() {
      walls = [];

      // 겹치지 않는 랜덤 벽 생성
      for (let i = 0; i < WALL_COUNT; i++) {
        let wall;
        let tries = 0;
        do {
          wall = {
            x: rng() * (WIDTH  - 300) + 150,
            y: rng() * (HEIGHT - 300) + 150,
            w: rng() * 150 + 100,
            h: rng() * 120 + 80
          };
          tries++;
        } while (tries < 50 && walls.some(existing => rectsOverlap(existing, wall)));
        walls.push(wall);
      }

      // 포탈 쌍 생성 — 좌우 대칭 배치
      let tries = 0;
      while (tries < 500) {
        const ax = rng() * (WIDTH / 2 - 200) + 150;
        const ay = rng() * (HEIGHT - 300) + 150;
        const bx = WIDTH  - ax;
        const by = HEIGHT - ay;

        const a = { x: ax, y: ay };
        const b = { x: bx, y: by };

        const isFarEnough = Math.hypot(ax - bx, ay - by) > PORTAL_RADIUS * 4;

        if (isPortalPositionValid(a, walls) &&
            isPortalPositionValid(b, walls) &&
            isFarEnough) {
          portalA = a;
          portalB = b;
          break;
        }
        tries++;
      }
    }

    /**
     * 플레이어 스폰 위치 탐색
     *
     * [버그 수정] 기존 코드는 고정된 방향(+y)으로만 탐색해
     * 벽이 밀집된 경우 유효한 위치를 못 찾거나 경계에 갇히는 문제가 있었음.
     * → 랜덤 탐색 방식으로 변경하고, 플레이어 반경 + 여유 마진을 적용.
     * → 최대 시도 횟수 초과 시 안전한 기본 위치로 폴백.
     *
     * @param {number} preferX - 선호 X 위치 (화면 좌/우 끝)
     * @param {number} fallbackY - 폴백 Y 위치
     * @returns {{ x: number, y: number }}
     */
    function findSpawnPosition(preferX, fallbackY) {
      const margin = PLAYER_RADIUS + SPAWN_MARGIN;
      const safeRadius = PLAYER_RADIUS + 10; // 벽과의 최소 거리

      for (let i = 0; i < SPAWN_MAX_TRIES; i++) {
        // 선호 X 근처에서 Y를 랜덤 탐색 (플레이어가 좌/우에 배치되도록)
        const x = clamp(preferX, margin, WIDTH  - margin);
        const y = rng() * (HEIGHT - margin * 2) + margin;

        if (isCircleClearOfWalls(x, y, safeRadius, walls)) {
          return { x, y };
        }
      }

      // 폴백: 경계 근처 안전 위치
      return {
        x: clamp(preferX, margin, WIDTH  - margin),
        y: clamp(fallbackY, margin, HEIGHT - margin)
      };
    }

    /* =====================
       렌더링
    ===================== */
    function renderWalls() {
      walls.forEach(w => {
        const gradient = ctx.createLinearGradient(w.x, w.y, w.x + w.w, w.y + w.h);
        gradient.addColorStop(0, "#333");
        gradient.addColorStop(1, "#111");

        ctx.fillStyle   = gradient;
        ctx.fillRect(w.x, w.y, w.w, w.h);

        ctx.shadowColor = "#444";
        ctx.shadowBlur  = 12;
        ctx.strokeStyle = "#666";
        ctx.lineWidth   = 4;
        ctx.strokeRect(w.x, w.y, w.w, w.h);
      });
    }

    function renderPortals() {
      if (!portalA || !portalB) return;

      [portalA, portalB].forEach(portal => {
        const hue = (performance.now() / 5) % 360;
        ctx.strokeStyle = `hsl(${hue}, 90%, 60%)`;
        ctx.shadowColor = ctx.strokeStyle;
        ctx.shadowBlur  = 30;
        ctx.lineWidth   = 6;
        ctx.beginPath();
        ctx.arc(portal.x, portal.y, PORTAL_RADIUS, 0, Math.PI * 2);
        ctx.stroke();
      });
    }

    function renderBorder() {
      ctx.strokeStyle = "#fff";
      ctx.lineWidth   = 8;
      ctx.shadowColor = "#fff";
      ctx.shadowBlur  = 10;
      ctx.strokeRect(0, 0, WIDTH, HEIGHT);
    }

    /* =====================
       게임 오버 연출
    ===================== */
    let gameOverAnimTime = 0;

    function renderGameOver(dt) {
      gameOverAnimTime += dt * 2;

      ctx.save();
      ctx.translate(WIDTH / 2, HEIGHT / 2);
      ctx.rotate(Math.sin(gameOverAnimTime) * 0.05);

      const scale = 1 + Math.sin(gameOverAnimTime * 2) * 0.1;
      ctx.scale(scale, scale);

      const gradient = ctx.createLinearGradient(-300, 0, 300, 0);
      gradient.addColorStop(0,   "#ff4dff");
      gradient.addColorStop(0.5, "#fff");
      gradient.addColorStop(1,   "#4d4dff");

      ctx.textAlign = "center";
      ctx.fillStyle = gradient;
      ctx.font      = "bold 90px Arial";
      ctx.fillText("GAME OVER", 0, -60);

      ctx.font      = "bold 48px Arial";
      ctx.fillStyle = "#fff";
      ctx.fillText("Press R to Restart", 0, 40);

      ctx.restore();
    }

    /* =====================
       게임 초기화
    ===================== */
    let player1  = null;
    let player2  = null;
    const stars      = [];
    const particles  = [];
    let isGameOver   = false;
    let lastTime     = 0;

    function initGame() {
      stars.length     = 0;
      particles.length = 0;
      bullets.length   = 0;

      for (let i = 0; i < STAR_COUNT; i++) stars.push(new Star());

      generateMap();

      // 스폰 위치 탐색 (버그 수정: 기존 선형 탐색 → 랜덤 탐색 + 폴백)
      const spawn1 = findSpawnPosition(50,          HEIGHT / 2);
      const spawn2 = findSpawnPosition(WIDTH - 50,  HEIGHT / 2);

      player1 = new Player(spawn1.x, spawn1.y, "#4fc3f7", {
        up: "KeyW", down: "KeyS", left: "KeyA", right: "KeyD", attack: "KeyF"
      });

      player2 = new Player(spawn2.x, spawn2.y, "#ff5252", {
        up: "ArrowUp", down: "ArrowDown", left: "ArrowLeft", right: "ArrowRight", attack: "ControlRight"
      });

      isGameOver      = false;
      gameOverAnimTime = 0;
      lastTime        = performance.now();

      requestAnimationFrame(gameLoop);
    }

    /* =====================
       게임 루프
    ===================== */
    function gameLoop(timestamp) {
      const rawDt = (timestamp - lastTime) / 1000;
      lastTime = timestamp;

      // 히트 스톱 — 일정 시간 동안 프레임 건너뜀
      if (hitStopRemaining > 0) {
        hitStopRemaining -= rawDt;
        requestAnimationFrame(gameLoop);
        return;
      }

      const dt = rawDt;

      ctx.save();

      // 카메라 쉐이크
      if (shakeTimeRemaining > 0) {
        shakeTimeRemaining -= dt;
        ctx.translate(
          (rng() - 0.5) * shakePower,
          (rng() - 0.5) * shakePower
        );
      }

      // 배경 지우기
      ctx.fillStyle = "#111";
      ctx.fillRect(0, 0, WIDTH, HEIGHT);

      // 별 업데이트 & 렌더링
      stars.forEach(star => { star.update(dt); star.render(); });

      // 맵 렌더링
      renderWalls();
      renderPortals();

      if (!isGameOver) {
        // 플레이어 업데이트
        player1.update(dt, walls, portalA, portalB);
        player2.update(dt, walls, portalA, portalB);

        // 탄환 업데이트
        updateBullets(dt);
      }

      // 탄환 렌더링
      renderBullets();

      // 플레이어 렌더링
      player1.render();
      player2.render();

      // 파티클 렌더링
      for (let i = particles.length - 1; i >= 0; i--) {
        const p = particles[i];
        p.update(dt);
        if (p.life <= 0) {
          particles.splice(i, 1);
        } else {
          p.render();
        }
      }

      if (isGameOver) renderGameOver(dt);

      renderBorder();
      ctx.restore();

      requestAnimationFrame(gameLoop);
    }

    /* =====================
       시작
    ===================== */
    initGame();
  </script>
</body>
